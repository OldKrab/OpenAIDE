name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must be a SemVer release such as v0.0.1 or v0.0.1-alpha.1" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$version" != "$package_version" ]]; then
            echo "Tag version $version does not match package.json version $package_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  checks:
    name: Release checks
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run check
      - run: cargo test --workspace
      - run: npm run test:gate
      - run: npm run test --workspaces --if-present

  artifacts:
    needs: [validate, checks]
    uses: ./.github/workflows/build-vsix.yml
    with:
      version: ${{ needs.validate.outputs.version }}

  marketplace:
    name: Publish VS Code Marketplace packages
    if: ${{ !contains(github.ref_name, '-') }}
    needs: [validate, artifacts]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          path: release
          merge-multiple: true
      - name: Publish platform packages
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for package in release/*.vsix; do
            npx --yes @vscode/vsce@3.6.0 publish --packagePath "$package"
          done

  github-release:
    name: Publish GitHub release
    needs: [validate, artifacts]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Read release notes from version commit
        id: release-notes
        shell: bash
        run: |
          commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          notes_path="$RUNNER_TEMP/release-notes.md"
          git log -1 --format=%B "$commit" > "$notes_path"
          printf '\n' >> "$notes_path"
          echo "path=$notes_path" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          pattern: vsix-*
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.release-notes.outputs.path }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: release/*
