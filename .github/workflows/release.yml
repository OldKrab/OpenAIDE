name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+(\.[0-9A-Za-z]+)*)?$ ]]; then
            echo "Release tag must be a SemVer release such as v0.0.1 or v0.0.1-alpha.1" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$version" != "$package_version" ]]; then
            echo "Tag version $version does not match package.json version $package_version" >&2
            exit 1
          fi
          extension_version="$(node -p "require('./apps/vscode-extension/package.json').version")"
          if [[ "$version" != "$extension_version" ]]; then
            echo "Release version $version does not match VSIX version $extension_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  checks:
    name: Release checks
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run check
      - run: cargo test --workspace
      - run: npm run test:gate
      - run: npm run test --workspaces --if-present

  artifacts:
    name: Build ${{ matrix.target }} VSIX
    needs: [validate, checks]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            binary: openaide-app-server
          - os: windows-2025
            target: win32-x64
            binary: openaide-app-server.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: cargo build --release -p openaide-app-server
      - run: npm run build:frontend
      - name: Add extension license
        shell: bash
        run: cp LICENSE apps/vscode-extension/LICENSE
      - name: Package platform VSIX
        shell: bash
        run: |
          mkdir -p release apps/vscode-extension/dist/app-server
          cp "target/release/${{ matrix.binary }}" apps/vscode-extension/dist/app-server/
          npx --yes @vscode/vsce@3.6.0 package \
            --target "${{ matrix.target }}" \
            --cwd apps/vscode-extension \
            --out "../../release/openaide-vscode-${{ matrix.target }}-${{ needs.validate.outputs.version }}.vsix"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/
          if-no-files-found: error

  marketplace:
    name: Publish VS Code Marketplace packages
    if: ${{ !contains(github.ref_name, '-') }}
    needs: [validate, artifacts]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Publish platform packages
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for package in release/*.vsix; do
            npx --yes @vscode/vsce@3.6.0 publish --packagePath "$package"
          done

  github-release:
    name: Publish GitHub release
    needs: [validate, artifacts]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: release/*
