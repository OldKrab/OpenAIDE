name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must have the form vMAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$version" != "$package_version" ]]; then
            echo "Tag version $version does not match package.json version $package_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  artifacts:
    name: Build release artifacts
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: npm run check
      - run: cargo test --workspace
      - run: npm run test:gate
      - run: npm run test --workspaces --if-present
      - run: cargo build --release -p openaide-app-server
      - run: npm run build:frontend
      - name: Package release files
        shell: bash
        run: |
          mkdir -p release apps/vscode-extension/dist/app-server
          cp target/release/openaide-app-server apps/vscode-extension/dist/app-server/
          npx --yes @vscode/vsce@3.6.0 package \
            --cwd apps/vscode-extension \
            --out "../../release/openaide-vscode-${{ needs.validate.outputs.version }}.vsix"
          tar -C packages/frontend/dist -czf \
            "release/openaide-web-assets-${{ needs.validate.outputs.version }}.tar.gz" .
          cp target/release/openaide-app-server \
            "release/openaide-app-server-linux-x64-${{ needs.validate.outputs.version }}"
          cd release
          sha256sum openaide-* > SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/
          if-no-files-found: error

  container:
    name: Publish container
    needs: validate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/demo/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub release
    needs: [validate, artifacts, container]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release/*
