name: Build VSIX Artifacts

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: SemVer stamped into packaged artifacts; defaults to package.json for manual runs.
        type: string
        required: false

permissions:
  contents: read

jobs:
  artifacts:
    name: Build ${{ matrix.target }} VSIX
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            binary: openaide-app-server
          - os: windows-2025
            target: win32-x64
            binary: openaide-app-server.exe
          - os: macos-15
            target: darwin-arm64
            binary: openaide-app-server
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - name: Set artifact versions
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          version="${REQUESTED_VERSION:-$(node -p "require('./package.json').version")}"
          node scripts/set-release-artifact-version.mjs "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: cargo build --release -p openaide-app-server
      - run: npm run build:frontend
      - name: Add extension license
        shell: bash
        run: cp LICENSE apps/vscode-extension/LICENSE
      - name: Package platform VSIX
        shell: bash
        run: |
          mkdir -p artifacts apps/vscode-extension/dist/app-server
          cp "target/release/${{ matrix.binary }}" apps/vscode-extension/dist/app-server/
          cd apps/vscode-extension
          npx --yes @vscode/vsce@3.6.0 package \
            --target "${{ matrix.target }}" \
            --no-dependencies \
            --out "../../artifacts/openaide-vscode-${{ matrix.target }}-${{ steps.version.outputs.version }}.vsix"
      - uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
