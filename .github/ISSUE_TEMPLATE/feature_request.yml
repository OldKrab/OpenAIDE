name: Feature request
description: Propose a user-facing or protocol-level improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or integration problem needs solving?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
